<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(to right, #0f172a, #1e293b);
        }

        .box {
            width: 350px;
            margin: 120px auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .link {
            text-align: center;
            margin-top: 10px;
        }

        .link a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>

<script>
    const params = new URLSearchParams(window.location.search);

    if (params.get("error") === "1") {
        alert("Invalid username or password!");
    }
</script>

<body>

<div class="box">

    <h2>Login</h2>

    <form action="login" method="post">
        <input type="text" name="username" placeholder="Enter username" required>
        <input type="password" name="password" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <div class="link">
        Don't have an account? <a href="signup.html">Signup</a>
    </div>

</div>

</body>
</html>
